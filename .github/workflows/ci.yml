name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: userapi
          POSTGRES_PASSWORD: mdp_test
          POSTGRES_DB: userapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      working-directory: userapi
      run: pip install -r requirements.txt

    - name: Run tests
      working-directory: userapi
      env: 
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: userapi
        DB_PASSWORD: mdp_test
        DB_NAME: userapi
      run: pytest -v
    
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./image/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/userapi:latest